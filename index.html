            🎬 SeriesApp

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>

        <div class="collapse navbar-collapse" id="nav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="#inicio">Inicio</a>

                <li class="nav-item">

                    <a class="nav-link" href="#formulario">Agregar</a>
                </li>

            </ul>

    <!-- Hero -->
    <header class="bg-primary text-white text-center py-5">
        <div class="container">
            <h1>Mis Series Favoritas</h1>
            <p>Una colección de las mejores series que vi.</p>
        </div>
    </header>

    <!-- Cards -->
    <main class="container my-5">

        <div class="row productos">

        </div>
        <iframe
            src="https://docs.google.com/forms/d/e/1FAIpQLScH16fT1yipDdEuXupl5OIpx5okhg6GCzSdFUGyNCDK95uTrw/viewform?embedded=true"
            width="640" height="996" frameborder="0" marginheight="0" marginwidth="0">Cargando…</iframe>
        <section id="formulario" class="container my-5">

            <h2 class="mb-4">Agregar serie</h2>

            <form id="formSerie">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombre" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Género</label>
                    <input type="text" class="form-control" id="genero" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Puntaje</label>
                    <input type="number" class="form-control" id="puntaje" min="1" max="10" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Imagen (URL)</label>
                    <input type="text" class="form-control" id="imagen" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tráiler (URL)</label>
                    <input type="text" class="form-control" id="trailer" required>
                </div>

                <button type="submit" class="btn btn-success">
                    Agregar serie
                </button>

            </form>

        </section>
        <!-- Footer -->
        <footer class="bg-dark text-white text-center py-3">
            Proyecto realizado con Bootstrap
        </footer>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

            crossorigin="anonymous"></script>
        <script type="module" src="script.js"></script>

</body>

</html>
